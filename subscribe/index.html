<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe</title>

<script src="https://www.paypal.com/sdk/js?client-id=ARSC0piTMl8_eA6whR0rPgawPLkJcxJrwUVAv7UeqipoOboy8wss4_YdAYV0_BqtrjHW2EusXhtNKAC1&vault=true&intent=subscription"></script>

<style>
:root {
  --bg: #0b1220;
  --text: #e5eefc;
  --muted: #8fa0bd;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0b1220, #0a0f1a);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 520px;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 10px;
}

.subtitle {
  color: var(--muted);
  margin-bottom: 30px;
}

.price {
  font-size: 46px;
  font-weight: 800;
  background: linear-gradient(120deg, var(--blue), var(--blue-light));
  -webkit-background-clip: text;
  color: transparent;
  margin-bottom: 5px;
}

.price span {
  font-size: 16px;
  color: var(--muted);
  font-weight: 400;
}

.price-desc {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 25px;
}

/* Terms */
.terms {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--muted);
}

.terms input {
  accent-color: var(--blue);
  cursor: pointer;
}

.terms a {
  color: var(--blue-light);
  text-decoration: underline;
}

/* Disabled overlay */
.disabled-overlay {
  opacity: 0.4;
  pointer-events: none;
}

/* Messages */
.error {
  color: #f87171;
  margin-top: 15px;
}

.success {
  color: #34d399;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="wrapper">
  <h1>Become a Member</h1>
  <div class="subtitle">Unlock full access to all courses and content</div>

  <div class="price">$25 <span>/ month</span></div>
  <div class="price-desc">Cancel anytime • Instant access</div>

  <!-- Terms checkbox -->
  <div class="terms">
    <input type="checkbox" id="agreeTerms">
    <label for="agreeTerms">
      I agree to the <a href="#" target="_blank">Terms & Services</a>
    </label>
  </div>

  <!-- PayPal -->
  <div id="paypal-button-container" class="disabled-overlay"></div>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let user_id = params.get("id");

function isValidUserId(id) {
  return id && /^\d{10}$/.test(id);
}

const container = document.getElementById('paypal-button-container');
const checkbox = document.getElementById('agreeTerms');

// Toggle PayPal enable/disable
checkbox.addEventListener('change', () => {
  if (checkbox.checked) {
    container.classList.remove('disabled-overlay');
  } else {
    container.classList.add('disabled-overlay');
  }
});

if (!isValidUserId(user_id)) {
  container.innerHTML = "<div class='error'>Invalid or missing user ID</div>";
} else {
  paypal.Buttons({
    style: {
      shape: 'pill',
      color: 'blue',
      layout: 'vertical',
      label: 'subscribe'
    },
    onClick: function(data, actions) {
      if (!checkbox.checked) {
        alert("You must agree to the Terms & Services");
        return actions.reject();
      }
      return actions.resolve();
    },
    createSubscription: function(data, actions) {
      return actions.subscription.create({
        custom_id: user_id,
        plan_id: 'P-50U33288R5328161TNH5WSPI'
      });
    },
    onApprove: function(data, actions) {
      container.innerHTML += 
        "<div class='success'>Subscription successful<br>ID: " + data.subscriptionID + "</div>";
    }
  }).render('#paypal-button-container');
}
</script>

</body>
</html>
