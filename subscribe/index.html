<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subscribe</title>

<meta name="description" content="Subscribe to access premium coding courses, full-stack development lessons, and digital educational resources.">

<link rel="icon" href="/favicon.ico">

<script src="https://www.paypal.com/sdk/js?client-id=AUHjRvEXheB_XJKSFBlTgpDnifujqI2F9uLNpokO-dkQmgMetN1nwh5-GG6XsYigyQobmLdY-DZiAs4q&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>

<style>

:root{
  --bg:#0b1220;
  --text:#e5eefc;
  --muted:#8fa0bd;
  --blue:#3b82f6;
  --blue-light:#60a5fa;
  --line:rgba(255,255,255,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#0b1220,#0a0f1a);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.wrapper{
  width:100%;
  max-width:560px;
  text-align:center;
  padding:34px;
  border-radius:24px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--line);
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.logo{
  font-size:0.95rem;
  font-weight:700;
  color:#dbeafe;
  margin-bottom:18px;
  letter-spacing:0.04em;
}

h1{
  font-size:38px;
  margin-bottom:10px;
  line-height:1.1;
}

.subtitle{
  color:var(--muted);
  margin-bottom:30px;
  line-height:1.7;
}

.price{
  font-size:54px;
  font-weight:900;
  background:linear-gradient(120deg,var(--blue),var(--blue-light));
  -webkit-background-clip:text;
  color:transparent;
}

.price span{
  font-size:18px;
  color:var(--muted);
}

.price-desc{
  color:var(--muted);
  margin:12px 0 24px;
  font-size:14px;
}

.features{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:28px;
}

.feature{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(96,165,250,0.1);
  border:1px solid rgba(96,165,250,0.18);
  font-size:13px;
  color:#dbeafe;
}

.notice{
  margin-top:22px;
  color:var(--muted);
  font-size:13px;
  line-height:1.7;
}

.legal-links{
  margin-top:24px;
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.legal-links a{
  color:#9cc3ff;
  text-decoration:none;
  font-size:13px;
}

.legal-links a:hover{
  text-decoration:underline;
}

.success{
  color:#34d399;
  margin-top:16px;
  line-height:1.7;
}

.error{
  color:#f87171;
  margin-top:16px;
}

.back-link{
  display:inline-block;
  margin-top:28px;
  color:var(--muted);
  font-size:14px;
  text-decoration:none;
}

.back-link:hover{
  color:white;
}

</style>
</head>

<body>

<div class="wrapper">

  

  <h1>Become a Member</h1>

  <div class="subtitle">
    Unlock full access 
  </div>

  <div class="price">
    $25 <span>/ month</span>
  </div>

  <div class="price-desc">
    Cancel anytime • Instant access
  </div>

  

  <div id="paypal-button-container"></div>

  <!-- <div class="notice">
    By subscribing, you agree to receive digital educational services
    and recurring subscription billing according to the selected plan.
  </div> -->

  <div class="legal-links">
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms">Terms of Service</a>
    <a href="/refund-policy">Refund Policy</a>
    <a href="/contact">Contact</a>
  </div>

<a href="/" class="back-link" id="backLink" style="display:none;">
  ← Back to Home
</a>

</div>

<script>

const paypalContainer =
document.getElementById("paypal-button-container");
const backLink =
document.getElementById("backLink");

const params =
new URLSearchParams(window.location.search);

const user_id = params.get("id");
if(user_id === "8725265061"){
  backLink.style.display = "inline-block";
}
if (!user_id){

  paypalContainer.innerHTML =
  "<div class='error'>Invalid user ID</div>";

} else {

  paypal.Buttons({

    style:{
      shape:'pill',
      color:'blue',
      layout:'vertical',
      label:'subscribe'
    },

    createSubscription:function(data, actions){

      return actions.subscription.create({

        plan_id:'P-2YL44982XP430694BNIAJ57Y',

        custom_id:user_id

      });

    },

    onApprove:function(data){

      paypalContainer.innerHTML +=
      "<div class='success'>Subscription successful.<br>Subscription ID: "
      + data.subscriptionID +
      "</div>";

    },

    onError:function(err){

      paypalContainer.innerHTML +=
      "<div class='error'>Something went wrong. Please try again later.</div>";

      console.error(err);

    }

  }).render('#paypal-button-container');

}

</script>

</body>
</html>
