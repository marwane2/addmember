<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe</title>

<script src="https://www.paypal.com/sdk/js?client-id=BAAFOO97RxAhYVgybDdHagxK4WXcMRZxHcTNk3GkPx2jULr8suJZkUCGh_jczM6uKqO6Fm8_3-g2QirUq8&vault=true&intent=subscription" data-sdk-integration-source="button-factory"></script>
<script>
<style>
:root {
  --bg: #0b1220;
  --text: #e5eefc;
  --muted: #8fa0bd;
  --blue: #3b82f6;
  --blue-light: #60a5fa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#0b1220,#0a0f1a);
  color: var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.wrapper {
  width:100%;
  max-width:520px;
  text-align:center;
  padding:20px;
}

h1 {
  font-size:32px;
  margin-bottom:10px;
}

.subtitle {
  color:var(--muted);
  margin-bottom:30px;
}

.price {
  font-size:46px;
  font-weight:800;
  background: linear-gradient(120deg,var(--blue),var(--blue-light));
  -webkit-background-clip:text;
  color:transparent;
}

.price span {
  font-size:16px;
  color:var(--muted);
}

.price-desc {
  color:var(--muted);
  margin-bottom:25px;
  font-size:13px;
}

.terms {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:20px;
  font-size:14px;
  color:var(--muted);
}

.terms button {
  background:none;
  border:none;
  color:var(--blue-light);
  text-decoration:underline;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:1000;
}

.modal-content {
  background:#0b1220;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  max-width:700px;
  width:100%;
  max-height:80vh;
  overflow-y:auto;
  padding:20px;
  text-align:left;
}

.modal h2 {
  margin-bottom:10px;
}

.modal p,
.modal li {
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
  margin-bottom:8px;
}

.close-btn {
  margin-top:15px;
  background:var(--blue);
  border:none;
  padding:10px 16px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.success {
  color:#34d399;
  margin-top:15px;
}

.error {
  color:#f87171;
  margin-top:15px;
}
</style>
</head>

<body>

<a href='/' style='display:none'>back</a>

<div class="wrapper">
  <h1>Become a Member</h1>
  <div class="subtitle">Unlock full access</div>

  <div class="price">$25 <span>/ month</span></div>
  <div class="price-desc">Cancel anytime • Instant access</div>

  <div class="terms">
    <!-- <label>By subscribing you agree to the</label> -->
    <a href='/terms' >Terms & Service</a>
  </div>

  <div id="paypal-button-container"></div>
</div>



<script>


let params = new URLSearchParams(window.location.search);
let user_id = params.get("id");



if (!user_id) {

  paypalContainer.innerHTML =
    "<div class='error'>Invalid user ID</div>";

} else {

  paypal.Buttons({

    style: {
      shape: 'pill',
      color: 'blue',
      layout: 'vertical',
      label: 'subscribe'
    },

    createSubscription: function(data, actions) {

      return actions.subscription.create({
        plan_id: 'P-2YL44982XP430694BNIAJ57Y',
          custom_id: user_id
      });
    },

    onApprove: function(data) {

      paypalContainer.innerHTML +=
        "<div class='success'>Subscription successful<br>ID: "
        + data.subscriptionID +
        "</div>";
    }

  }).render('#paypal-button-container');
}
</script>

</body>
</html>
